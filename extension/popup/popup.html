<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midori Sync</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Login View -->
    <div id="view-login" class="view hidden">
        <div class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </div>
            <h1>Midori Sync</h1>
            <p class="subtitle">Sign in to sync your browser data across all your devices</p>
        </div>

        <div class="form">
            <div class="field">
                <label for="server-url">Server URL</label>
                <input type="url" id="server-url" placeholder="http://localhost:8000" value="http://localhost:8000">
            </div>
            <div id="login-error" class="error hidden"></div>
            <button id="login-btn" class="btn btn-primary">
                <span class="btn-text">Sign in with Astian Account</span>
                <span class="btn-loading hidden">Waiting for login...</span>
            </button>
            <p class="login-hint">A new tab will open for you to sign in securely.</p>
        </div>

        <div class="footer-link">
            <button id="show-pair" class="link-btn">Pair with another device</button>
        </div>
    </div>

    <!-- Pair View (scan/enter code) -->
    <div id="view-pair" class="view hidden">
        <div class="header compact">
            <button id="pair-back" class="back-btn">&larr; Back</button>
            <h2>Pair Device</h2>
            <p class="subtitle">Enter the pairing code from your other device</p>
        </div>

        <form id="pair-form" class="form">
            <div class="field">
                <label for="pair-server">Server URL</label>
                <input type="url" id="pair-server" placeholder="http://localhost:8000" value="http://localhost:8000">
            </div>
            <div class="field">
                <label for="pair-code">Pairing Code</label>
                <input type="text" id="pair-code" placeholder="Enter 32-character code" required>
            </div>
            <div id="pair-error" class="error hidden"></div>
            <button type="submit" class="btn btn-primary">
                <span class="btn-text">Connect Device</span>
                <span class="btn-loading hidden">Connecting...</span>
            </button>
        </form>
    </div>

    <!-- Logged In View -->
    <div id="view-main" class="view hidden">
        <div class="header compact">
            <div class="user-info">
                <div class="avatar" id="user-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div>
                    <div class="user-name" id="user-name">User</div>
                    <div class="user-email" id="user-email">user@email.com</div>
                </div>
            </div>
        </div>

        <!-- Sync Status -->
        <div class="section">
            <div class="section-header">
                <h3>Sync Status</h3>
                <button id="sync-all-btn" class="btn btn-sm btn-primary">Sync Now</button>
            </div>
            <div id="sync-items" class="sync-list"></div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button id="open-settings" class="btn btn-secondary btn-block">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
                Settings
            </button>
            <button id="logout-btn" class="btn btn-danger btn-block">Sign Out</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
