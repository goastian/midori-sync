# Midori Sync — nginx vhost (produccion).
# HTTPS forzado con HSTS, CSP a nivel de servidor y redireccion 80 -> 443.
# Requiere certificados TLS montados en /etc/nginx/ssl/.

# Redireccion HTTP -> HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Solo permitimos /.well-known/acme-challenge/ para renovacion ACME.
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 10M;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS: 1 ano + subdominios + preload. Solo emitir bajo HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # CSP a nivel de nginx como red de seguridad. La aplicacion tambien
    # emite CSP via SecurityHeaders middleware; el header de la app gana
    # en /api porque ahi nginx no envia CSP (header solo se aplica al
    # vhost). Aqui dejamos uno conservador para assets estaticos.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
