server {
    # Puerto no privilegiado: el contenedor corre como www-data y no puede
    # bindear <1024. El mapeo externo (docker-compose.yml) traduce el
    # puerto host a 8080 del contenedor.
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 10M;

    # NOTE: este archivo es el vhost generico (HTTP plano) que el
    # contenedor base monta por defecto. Para entornos con certificados
    # TLS usar `docker/nginx.prod.conf` (incluye HTTPS forzado, HSTS y
    # CSP). Ver `docs/deployment.md`.

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /build/ {
        expires 1y;
        # nginx inherits add_header desde el bloque padre solo si no se
        # declara ningun add_header aqui. Como anadimos Cache-Control,
        # debemos re-emitir explicitamente los headers de seguridad.
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
